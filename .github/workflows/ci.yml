name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  golang:
    name: Golang
    permissions:
      contents: write
      pull-requests: write
      checks: write
    uses: depado/github-actions/.github/workflows/golang.yml@b261fdb774efce96fe9d92ef9243a57e2d953d9a # main
    with:
      build-command: "make"

  docker:
    name: Docker
    needs: [golang]
    permissions:
      contents: read
      packages: write
      actions: read
    uses: depado/github-actions/.github/workflows/docker.yml@b261fdb774efce96fe9d92ef9243a57e2d953d9a # main
    secrets:
      cleanup-token: ${{ secrets.PAT_DELETE_PACKAGES }}
